name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: safemail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # conftest.py forces DEBUG/RATE_LIMIT/INVITE_ONLY, but DATABASE_URL/REDIS_URL
      # and the JWT keys are read at import, so set them here.
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/safemail_test
      REDIS_URL: redis://localhost:6379/0
      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate JWT keypair + Fernet key
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem
          echo "FERNET_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Run tests
        # Excludes tests/evaluation/test_classifier.py — that hits the real Claude
        # API (costs money + needs a key). See classifier-eval.yml to run it.
        run: >-
          pytest -v
          tests/test_monitoring.py
          tests/test_analytics.py
          tests/test_email_providers.py
          tests/test_auth.py
          tests/test_alerts.py
          tests/test_dev_seam.py
          tests/evaluation/test_pipeline.py

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: safemail_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Hermetic E2E: seed seam on, invite/rate-limit off, outbound email disabled,
      # no external API keys. The frontend dev server proxies /v1 to this API.
      DEBUG: "true"
      E2E_SEED_ENABLED: "true"
      E2E_SEED_SECRET: ci-e2e-secret
      INVITE_ONLY_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      TRANSACTIONAL_EMAIL_ENABLED: "false"
      COOKIE_SECURE: "false"
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/safemail_e2e
      REDIS_URL: redis://localhost:6379/0
      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Generate JWT keypair + Fernet key
        working-directory: backend
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem
          echo "FERNET_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start API (background)
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn-e2e.log 2>&1 &
          disown || true
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && { echo "API ready"; exit 0; }
            sleep 1
          done
          echo "API failed to start"; cat /tmp/uvicorn-e2e.log; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-e2e-log
          path: /tmp/uvicorn-e2e.log
          retention-days: 7
