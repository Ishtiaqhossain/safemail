# Canonical production stack — portable to any Docker host (VPS, or as the
# reference a PaaS manifest mirrors). Brings up the full app:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Secrets come from --env-file (.env.production, gitignored) or the host env.
# No bind mounts, no --reload: images are self-contained.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-safemail}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      RUN_MIGRATIONS: "true"   # only the API applies migrations (avoids a race)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "worker", "-l", "info", "-c", "4"]
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "beat", "-l", "info"]
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""   # relative; proxied to api below (same-origin)
    restart: unless-stopped
    environment:
      API_UPSTREAM: api:8000
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
